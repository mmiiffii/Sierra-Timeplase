name: Generate Timelapse from R2

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Start date (YYYY-MM-DD, Madrid time, inclusive)'
        required: true
      date_to:
        description: 'End date (YYYY-MM-DD, Madrid time, inclusive)'
        required: true
      fps:
        description: 'Output FPS (6 / 8 / 12 / 24)'
        required: false
        default: '12'
      strictness:
        description: '0 = all frames in order (ignore time gaps), 10 = strict real-time grid'
        required: false
        default: '5'
      interval:
        description: 'Minutes between frames (5/10/15/30/60/120/240/360/720/1440)'
        required: false
        default: '10'
      start_time:
        description: 'Earliest time of day to include, HH:MM Madrid time (e.g. 07:00)'
        required: false
        default: '07:00'

permissions:
  contents: write

concurrency:
  group: timelapse-r2
  cancel-in-progress: true

jobs:
  timelapse:
    runs-on: ubuntu-latest

    env:
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install pillow numpy

      - name: Fetch frames from R2
        env:
          DATE_FROM:  ${{ inputs.date_from }}
          DATE_TO:    ${{ inputs.date_to }}
          START_TIME: ${{ inputs.start_time }}
        run: |
          mkdir -p frames
          python3 - << 'PY'
          import os, re, json, subprocess
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          from pathlib import Path
          from concurrent.futures import ThreadPoolExecutor

          tz        = ZoneInfo("Europe/Madrid")
          date_from = datetime.strptime(os.environ["DATE_FROM"], "%Y-%m-%d").replace(tzinfo=tz)
          date_to   = datetime.strptime(os.environ["DATE_TO"],   "%Y-%m-%d").replace(tzinfo=tz) \
                        .replace(hour=23, minute=59, second=59)
          # Daytime window: start_h from input, fixed end at 20:00
          _st       = os.environ.get("START_TIME", "07:00")
          start_h   = int(_st.split(":")[0])
          start_m   = int(_st.split(":")[1]) if ":" in _st else 0
          end_h     = 20
          bucket   = os.environ["R2_BUCKET"]
          endpoint = os.environ["R2_ENDPOINT"]
          prefix   = "sierra-timeplase/images/"

          re6 = re.compile(r"_(\d{6})_(\d{6})\.jpg$", re.I)
          re8 = re.compile(r"_(\d{8})_(\d{6})\.jpg$", re.I)

          def parse_dt(key):
              fname = key.split("/")[-1]
              m8 = re8.search(fname)
              if m8:
                  try:
                      return datetime.strptime("20" + m8.group(1)[2:] + m8.group(2),
                                               "%Y%m%d%H%M%S").replace(tzinfo=tz)
                  except: pass
              m6 = re6.search(fname)
              if m6:
                  try:
                      return datetime.strptime("20" + m6.group(1) + m6.group(2),
                                               "%Y%m%d%H%M%S").replace(tzinfo=tz)
                  except: pass
              return None

          # List all objects under prefix
          all_keys, token = [], None
          while True:
              cmd = ["aws","s3api","list-objects-v2","--bucket",bucket,"--prefix",prefix,
                     "--endpoint-url",endpoint,"--output","json"]
              if token:
                  cmd += ["--continuation-token", token]
              data = json.loads(subprocess.run(cmd, capture_output=True, text=True).stdout)
              for o in data.get("Contents", []):
                  if o["Key"].lower().endswith(".jpg"):
                      all_keys.append(o["Key"])
              if data.get("IsTruncated"):
                  token = data["NextContinuationToken"]
              else:
                  break

          print(f"Total R2 objects: {len(all_keys)}")

          # Filter to date range + daytime window
          to_dl = []
          for key in all_keys:
              dt = parse_dt(key)
              if dt and date_from <= dt <= date_to and (dt.hour > start_h or (dt.hour == start_h and dt.minute >= start_m)) and dt.hour < end_h:
                  local = Path("frames") / f"{len(to_dl):06d}_{dt.strftime('%Y%m%d_%H%M%S')}.jpg"
                  to_dl.append((dt, key, local))
          to_dl.sort()
          print(f"Frames in range {os.environ['DATE_FROM']} → {os.environ['DATE_TO']}: {len(to_dl)}")

          if not to_dl:
              raise SystemExit("No frames found for this date range.")

          def dl(item):
              dt, key, local = item
              r = subprocess.run(["aws","s3","cp", f"s3://{bucket}/{key}", str(local),
                                  "--endpoint-url", endpoint, "--quiet"], capture_output=True)
              return r.returncode == 0

          with ThreadPoolExecutor(max_workers=24) as ex:
              ok = sum(ex.map(dl, to_dl))
          print(f"Downloaded {ok}/{len(to_dl)} frames")

          Path("frames_manifest.json").write_text(
              json.dumps([(dt.isoformat(), str(local)) for dt, _, local in to_dl])
          )
          PY

      - name: Build timelapse
        env:
          FPS:         ${{ inputs.fps }}
          STRICTNESS:  ${{ inputs.strictness }}
          INTERVAL:    ${{ inputs.interval }}
          START_TIME:  ${{ inputs.start_time }}
          DATE_FROM:   ${{ inputs.date_from }}
          DATE_TO:     ${{ inputs.date_to }}
        run: |
          mkdir -p timelapses
          python3 - << 'PY'
          import os, json, subprocess
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import numpy as np
          from PIL import Image

          fps        = float(os.environ.get("FPS",       "12"))
          strictness = int(os.environ.get("STRICTNESS",  "5"))
          strictness = max(0, min(10, strictness))
          interval_m = int(os.environ.get("INTERVAL",   "10"))
          _st        = os.environ.get("START_TIME", "07:00")
          start_h    = int(_st.split(":")[0])
          end_h      = 20
          tz         = ZoneInfo("Europe/Madrid")

          manifest = json.loads(Path("frames_manifest.json").read_text())
          frames   = [(datetime.fromisoformat(ts), Path(p)) for ts, p in manifest]

          def is_glitched(path):
              try:
                  with Image.open(path) as im:
                      arr = np.array(im.convert("L"), dtype=np.float32)
                  h, w = arr.shape
                  if h < 100 or w < 100: return True
                  mean, std = arr.mean(), arr.std()
                  if mean < 5 or mean > 250: return True
                  if std < 8:               return True
                  if arr.max() - arr.min() < 20: return True
                  lm = arr[:, :w//2].mean(); rm = arr[:, w//2:].mean()
                  if abs(lm - rm) > 60 and (min(lm, rm) < 15 or max(lm, rm) > 240):
                      return True
                  return False
              except:
                  return True

          good, skipped = [], 0
          for dt, path in frames:
              if not path.exists():    skipped += 1; continue
              if is_glitched(path):   skipped += 1; print(f"  skip {path.name}"); continue
              good.append((dt, path))

          print(f"Usable: {len(good)}, skipped: {skipped}")
          if not good:
              raise SystemExit("No usable frames after glitch filtering.")

          # Interval sampling: keep one frame per interval_m minutes
          if interval_m > 10 and len(good) > 1:
              from datetime import timedelta as TD
              interval = TD(minutes=interval_m)
              sampled, last_kept = [], None
              for dt, path in good:
                  if last_kept is None or dt >= last_kept + interval:
                      sampled.append((dt, path))
                      last_kept = dt
              print(f"Interval sampling ({interval_m}min): {len(sampled)} frames (was {len(good)})")
              good = sampled

          # Build ffmpeg concat list with per-frame durations
          normal = 1.0 / fps
          hold   = 3.0 / fps   # golden-hour frames linger 3×

          lines = []
          for dt, path in good:
              is_golden = golden and (dt.hour == start_h or dt.hour == end_h - 1)
              dur = hold if is_golden else normal
              esc = str(path.resolve()).replace("'", r"'\''")
              lines += [f"file '{esc}'", f"duration {dur:.6f}"]

          concat = Path("timelapses/frames.txt")
          concat.write_text("\n".join(lines))

          date_from = os.environ["DATE_FROM"].replace("-","")
          date_to   = os.environ["DATE_TO"].replace("-","")
          stamp = datetime.now(tz).strftime("%Y%m%d_%H%M%S")
          out   = Path(f"timelapses/pradollano_{date_from}-{date_to}_{int(fps)}fps_{stamp}.mp4")

          cmd = ["ffmpeg","-y","-f","concat","-safe","0","-i",str(concat),
                 "-vsync","vfr","-c:v","libx264","-crf","20","-preset","fast",
                 "-vf","scale=trunc(iw/2)*2:trunc(ih/2)*2","-pix_fmt","yuv420p",str(out)]
          print("ffmpeg:", " ".join(cmd))
          subprocess.run(cmd, check=True)

          size_mb = round(out.stat().st_size / 1024**2, 1)
          print(f"Done: {out.name}  ({size_mb} MB)")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"TL_PATH={out}\n")
              f.write(f"TL_FRAMES={len(good)}\n")
              f.write(f"TL_SKIPPED={skipped}\n")
          PY

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "timelapse-${{ github.run_id }}"
          name: "Pradollano · ${{ inputs.date_from }} → ${{ inputs.date_to }} · ${{ inputs.fps }}fps"
          body: |
            **Camera:** Pradollano
            **Date range:** ${{ inputs.date_from }} → ${{ inputs.date_to }} (from ${{ inputs.start_time }} Madrid)
            **Interval:** ${{ inputs.interval }}min · **FPS:** ${{ inputs.fps }} · **Strictness:** ${{ inputs.strictness }}/10
            **Frames used:** ${{ env.TL_FRAMES }} · **Skipped:** ${{ env.TL_SKIPPED }}
          files: ${{ env.TL_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
