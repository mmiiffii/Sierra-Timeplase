name: Generate Timelapse from R2

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to look back (Madrid time)'
        required: false
        default: '7'
      fps:
        description: 'Output FPS — 6 / 8 / 12 / 24'
        required: false
        default: '12'
      start_hour:
        description: 'Earliest hour to include (0-23, Madrid time)'
        required: false
        default: '7'
      end_hour:
        description: 'Latest hour to include (0-23, Madrid time)'
        required: false
        default: '20'
      golden_hold:
        description: 'Hold first + last hour frames 3× longer (sunrise/sunset linger)'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: timelapse-r2
  cancel-in-progress: true

jobs:
  timelapse:
    runs-on: ubuntu-latest

    env:
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg awscli
          pip install pillow numpy

      - name: Fetch frames from R2
        env:
          DAYS: ${{ inputs.days }}
          START_HOUR: ${{ inputs.start_hour }}
          END_HOUR: ${{ inputs.end_hour }}
        run: |
          mkdir -p frames
          python3 - << 'PY'
          import os, re, json, subprocess
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          from pathlib import Path
          from concurrent.futures import ThreadPoolExecutor

          tz        = ZoneInfo("Europe/Madrid")
          days      = int(os.environ["DAYS"])
          start_h   = int(os.environ.get("START_HOUR", "7"))
          end_h     = int(os.environ.get("END_HOUR",   "20"))
          bucket    = os.environ["R2_BUCKET"]
          endpoint  = os.environ["R2_ENDPOINT"]
          prefix    = "sierra-timeplase/images/"
          now       = datetime.now(tz)
          cutoff    = (now - timedelta(days=days)).replace(hour=0, minute=0, second=0, microsecond=0)
          re6       = re.compile(r"_(\d{6})_(\d{6})\.jpg$", re.I)
          re8       = re.compile(r"_(\d{8})_(\d{6})\.jpg$", re.I)

          def parse_dt(key):
              fname = key.split("/")[-1]
              m8 = re8.search(fname)
              if m8:
                  try:
                      return datetime.strptime("20" + m8.group(1)[2:] + m8.group(2), "%Y%m%d%H%M%S").replace(tzinfo=tz)
                  except: pass
              m6 = re6.search(fname)
              if m6:
                  try:
                      return datetime.strptime("20" + m6.group(1) + m6.group(2), "%Y%m%d%H%M%S").replace(tzinfo=tz)
                  except: pass
              return None

          # List all objects
          all_keys, token = [], None
          while True:
              cmd = ["aws","s3api","list-objects-v2","--bucket",bucket,"--prefix",prefix,
                     "--endpoint-url",endpoint,"--output","json"]
              if token:
                  cmd += ["--continuation-token", token]
              data = json.loads(subprocess.run(cmd, capture_output=True, text=True).stdout)
              for o in data.get("Contents",[]):
                  if o["Key"].lower().endswith(".jpg"):
                      all_keys.append(o["Key"])
              if data.get("IsTruncated"):
                  token = data["NextContinuationToken"]
              else:
                  break

          print(f"Total objects in R2: {len(all_keys)}")

          # Filter to date+hour window
          to_dl = []
          for key in all_keys:
              dt = parse_dt(key)
              if dt and dt >= cutoff and start_h <= dt.hour < end_h:
                  idx  = len(to_dl)
                  local = Path("frames") / f"{idx:06d}_{dt.strftime('%Y%m%d_%H%M%S')}.jpg"
                  to_dl.append((dt, key, local))
          to_dl.sort()
          print(f"Frames in window: {len(to_dl)}")

          if not to_dl:
              raise SystemExit("No frames found — check date range and secrets.")

          def dl(item):
              dt, key, local = item
              r = subprocess.run(
                  ["aws","s3","cp", f"s3://{bucket}/{key}", str(local),
                   "--endpoint-url", endpoint, "--quiet"],
                  capture_output=True)
              return r.returncode == 0

          with ThreadPoolExecutor(max_workers=24) as ex:
              results = list(ex.map(dl, to_dl))
          print(f"Downloaded {sum(results)}/{len(to_dl)} frames")

          manifest = [(dt.isoformat(), str(local)) for dt, _, local in to_dl]
          Path("frames_manifest.json").write_text(json.dumps(manifest))
          PY

      - name: Build timelapse
        env:
          FPS:         ${{ inputs.fps }}
          START_HOUR:  ${{ inputs.start_hour }}
          END_HOUR:    ${{ inputs.end_hour }}
          GOLDEN_HOLD: ${{ inputs.golden_hold }}
          DAYS:        ${{ inputs.days }}
        run: |
          mkdir -p timelapses
          python3 - << 'PY'
          import os, json, subprocess
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import numpy as np
          from PIL import Image

          fps     = float(os.environ.get("FPS",         "12"))
          start_h = int(os.environ.get("START_HOUR",     "7"))
          end_h   = int(os.environ.get("END_HOUR",      "20"))
          golden  = os.environ.get("GOLDEN_HOLD","true").lower() in ("true","1","yes")
          days    = int(os.environ.get("DAYS",            "7"))
          tz      = ZoneInfo("Europe/Madrid")

          manifest = json.loads(Path("frames_manifest.json").read_text())
          frames   = [(datetime.fromisoformat(ts), Path(p)) for ts, p in manifest]

          def is_glitched(path):
              try:
                  with Image.open(path) as im:
                      arr = np.array(im.convert("L"), dtype=np.float32)
                  h, w = arr.shape
                  if h < 100 or w < 100: return True
                  mean, std = arr.mean(), arr.std()
                  if mean < 5 or mean > 250: return True   # black / white
                  if std < 8:               return True   # flat grey (no-signal)
                  if arr.max() - arr.min() < 20: return True
                  # Half-blank check (partial frame load)
                  lm, rm = arr[:, :w//2].mean(), arr[:, w//2:].mean()
                  if abs(lm - rm) > 60 and (min(lm, rm) < 15 or max(lm, rm) > 240):
                      return True
                  return False
              except:
                  return True

          good, skipped = [], 0
          for dt, path in frames:
              if not path.exists():  skipped += 1; continue
              if is_glitched(path):  skipped += 1; print(f"  skip: {path.name}"); continue
              good.append((dt, path))

          print(f"Usable: {len(good)}, skipped: {skipped}")
          if not good:
              raise SystemExit("No usable frames.")

          # Build ffmpeg concat list with per-frame durations
          # Normal duration = 1/fps; golden-hour (first + last hour of window) = 3x
          normal = 1.0 / fps
          hold   = 3.0 / fps

          lines = []
          for dt, path in good:
              is_golden = golden and (dt.hour == start_h or dt.hour == end_h - 1)
              dur = hold if is_golden else normal
              esc = str(path.resolve()).replace("'", r"'\''")
              lines += [f"file '{esc}'", f"duration {dur:.6f}"]

          concat = Path("timelapses/frames.txt")
          concat.write_text("\n".join(lines))

          stamp = datetime.now(tz).strftime("%Y%m%d_%H%M%S")
          out   = Path(f"timelapses/pradollano_{days}d_{int(fps)}fps_{stamp}.mp4")

          cmd = [
              "ffmpeg", "-y", "-f", "concat", "-safe", "0", "-i", str(concat),
              "-vsync", "vfr",
              "-c:v", "libx264", "-crf", "20", "-preset", "fast",
              "-vf",  "scale=trunc(iw/2)*2:trunc(ih/2)*2",
              "-pix_fmt", "yuv420p",
              str(out),
          ]
          print("ffmpeg:", " ".join(cmd))
          subprocess.run(cmd, check=True)

          size_mb = out.stat().st_size / 1024**2
          print(f"Done: {out.name}  ({size_mb:.1f} MB)")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"TL_PATH={out}\n")
              f.write(f"TL_FRAMES={len(good)}\n")
              f.write(f"TL_SKIPPED={skipped}\n")
          PY

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "timelapse-${{ github.run_id }}"
          name: "Pradollano · ${{ inputs.days }}d · ${{ inputs.fps }}fps"
          body: |
            **Camera:** Pradollano
            **Period:** Last ${{ inputs.days }} days · ${{ inputs.start_hour }}:00–${{ inputs.end_hour }}:00 Madrid time
            **Frame rate:** ${{ inputs.fps }} fps · Golden-hour hold: ${{ inputs.golden_hold }}
            **Frames used:** ${{ env.TL_FRAMES }} · **Skipped (glitch/blank):** ${{ env.TL_SKIPPED }}
          files: ${{ env.TL_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
